<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
<title>File Converter</title>
<link rel="icon" 
    href="/images/gaicon.png" 
    type="image/x-icon">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h2 class="mb-4">Upload & Convert Files</h2>

<div id="drop-area" class="p-5 rounded shadow bg-white">

<p class="text-muted">Drag & Drop Files Here</p>

<button class="btn btn-primary mt-2" onclick="openFile(event)">
Choose Files
</button>

<input type="file" id="fileElem" multiple hidden required>

</div>

<div id="preview" class="row mt-4"></div>

<button class="btn btn-success mt-4 px-4" onclick="uploadFiles()">
Convert to PDF
</button>

</div>
<a href="compress"><button class="btn btn-primary px-4">Compress Image</button></a>
<a href="docx"><button class="btn btn-warning px-4">DOCX To PDF</button></a>
<a href="ppt"><button class="btn btn-danger px-4">PPT To PDF</button></a>
<a href="excel"><button class="btn btn-success px-4">Excel To PDF</button></a>
<a href="split"><button class="btn btn-warning px-4">Split PDF</button></a>
<script src="/js/dragdrop.js"></script>

</body>
</html>
