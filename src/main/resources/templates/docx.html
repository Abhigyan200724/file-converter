<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
   <title>DOCX to PDF Converter</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">DOCX to PDF Converter</h2>

        <form action="/docx-to-pdf" method="post" enctype="multipart/form-data">

            <div class="mb-3">

                <input type="file" name="file" accept=".doc,.docx" multiple class="form-control" required>

            </div>
            <button class="btn btn-danger">
                Convert to PDF
            </button>
        </form>
		<br><br>
		
		<a href="/"><button class="btn btn-primary px-4">Image To PDF</button></a>
		<a href="compress"><button class="btn btn-warning px-4">Compress Image</button></a>
		<a href="ppt"><button class="btn btn-danger px-4">PPT To PDF</button></a>
		<a href="excel"><button class="btn btn-success px-4">Excel To PDF</button></a>
		<a href="split"><button class="btn btn-warning px-4">Split PDF</button></a>




    </div>
	
    
</body>
</html>
