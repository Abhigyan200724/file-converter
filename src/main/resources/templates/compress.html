<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Image Compressor</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Image Compressor</h2>

        <form action="/compress-image" method="post" enctype="multipart/form-data">

            <div class="mb-3">

                <input type="file" name="file" accept="image/*" multiple class="form-control" required>

            </div>
			<div class="mb-3">
				<label>Compression Level</label>
				
				<select name="quality" class="form-control" required>
					<option value="0.8">Low compression</option>
					<option value="0.5">Medium compression</option>
					<option value="0.2">High compression</option>
				</select>
			</div>
            <button class="btn btn-success">
                Compress Image
            </button>
        </form>
<br>
		<a href="/"><button class="btn btn-primary px-4">Image To PDF</button></a>
		<a href="docx"><button class="btn btn-warning px-4">DOCX To PDF</button></a>
		<a href="ppt"><button class="btn btn-danger px-4">PPT To PDF</button></a>
		<a href="excel"><button class="btn btn-success px-4">Excel To PDF</button></a>
		<a href="split"><button class="btn btn-warning px-4">Split PDF</button></a>


    </div>
    
</body>
</html>
