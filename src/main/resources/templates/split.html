<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
   <title>Split PDF</title>
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" >
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center">Split PDF</h2>

		<form action="/split-pdf"
		      method="post"
		      enctype="multipart/form-data">

		    <input type="file"
		           name="file"
		           class="form-control mb-3"
		           required>

		    <input type="number"
		           name="startPage"
		           class="form-control mb-3"
		           placeholder="Start Page">

		    <input type="number"
		           name="endPage"
		           class="form-control mb-3"
		           placeholder="End Page">

		    <button class="btn btn-primary">
		        Split PDF
		    </button>

		</form>
		<br><br>
		
		<a href="/"><button class="btn btn-primary px-4">Image To PDF</button></a>
		<a href="docx"><button class="btn btn-warning px-4">DOCX To PDF</button></a>
		<a href="compress"><button class="btn btn-danger px-4">Compress Image</button></a>
		<a href="excel"><button class="btn btn-success px-4">Excel To PDF</button></a>
		<a href="ppt"><button class="btn btn-success px-4">PPT To PDF</button></a>




    </div>
	
    
</body>
</html>
